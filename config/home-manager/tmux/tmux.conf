set -g prefix C-z
unbind C-b
bind C-z send-prefix
set -g default-terminal "tmux-direct"
set -g default-command "bash -l"
set-environment -gr __ETC_PROFILE_NIX_SOURCED
set-environment -gr __HM_SESS_VARS_SOURCED
set-option -g renumber-windows on
set -g status-interval 1
set -g status-right-length 120
set -g status-right "#(/bin/bash $HOME/.dotfiles/kube.tmux 230 colour219 colour27)#[fg=white] #(tmux-mem-cpu-load --interval 1) [%H:%M]"
bind-key -T prefix BSpace copy-mode -u
bind-key -T copy-mode BSpace send-keys -X page-up
bind-key c new-window -c "#{pane_current_path}"
set -g status-bg black
set -g status-fg white
bind r source-file ~/.tmux.conf

# Claude Code: pass through notifications/progress to outer terminal,
# and distinguish Shift+Enter from Enter so newline shortcut works.
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
